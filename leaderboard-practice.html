<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bible Battle</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-bible-battle">
  <div class="container">
    <header class="topbar">
      <a class="btn btn-ghost" href="index.html">← Home</a>
      <div class="brand">
        <img class="brandLogo" src="assets/bible-battle-logo.png" alt="Bible Battle"/>
        <span class="brandText">Practice Leaderboard</span>
      </div>
      <nav class="topnav">
        <a class="btn btn-ghost" href="leaderboard-daily.html">🏆 Daily</a>
      </nav>
    </header>

    <main class="card">
      <div class="lbControls">
        <div>
          <label for="cat">Category</label>
          <select id="cat" class="input-lg"></select>
        </div>

        <div>
          <label>Season</label>
          <div class="seasonChip" id="seasonLabel"></div>
          <div class="helper">Resets every 3 months.</div>
        </div>

        <div>
          <label for="limit">Show</label>
          <select id="limit" class="input-lg">
            <option value="10">Top 10</option>
            <option value="20" selected>Top 20</option>
            <option value="50">Top 50</option>
          </select>
        </div>
      </div>

      <div class="statusText" id="status"></div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr><th>#</th><th>Name</th><th>Category</th><th>Score</th><th>Correct</th><th>Date</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="fineprint">Tie-breakers: score → correct → fastest time.</div>
    </main>
  </div>

  <script type="module" src="leaderboard-practice.js"></script>
</body>
</html>
