<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bible Battle</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-bible-battle">
  <div class="container">
    <header class="topbar">
      <a class="btn btn-ghost" href="index.html">← Home</a>
      <div class="brand">
        <img class="brandLogo" src="assets/bible-battle-logo.png" alt="Bible Battle"/>
        <span class="brandText">Practice Leaderboard</span>
      </div>
      <nav class="topnav">
        <button class="btn btn-ghost" id="settingsBtn" type="button">⚙️ Settings</button>
        <a class="btn btn-ghost" href="leaderboard-daily.html">🏆 Daily</a>
      </nav>
    </header>

    <main class="card">
      <div class="lbControls">
        <div>
          <label for="cat">Category</label>
          <select id="cat" class="input-lg"></select>
        </div>

        <div style="text-align:center;">
          <label>Season</label>
          <div class="seasonVal" id="seasonLabel"></div>
          <div class="helper">Resets every 3 months.</div>
        </div>

        <div>
          <label for="limit">Show</label>
          <select id="limit" class="input-lg">
            <option value="10">Top 10</option>
            <option value="20" selected>Top 20</option>
            <option value="50">Top 50</option>
          </select>
        </div>
      </div>

      <div class="statusText" id="status"></div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr><th>#</th><th>Name</th><th class="col-cat">Category</th><th>Score</th><th>Correct</th><th class="col-date">Date</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="fineprint">Tie-breakers: score → correct → fastest time.</div>
    </main>
  </div>

  <script type="module" src="leaderboard-practice.js"></script>
  <div id="settingsOverlay" class="modalOverlay"></div>
  <div id="settingsModal" class="modal">
    <div class="modalHeader">
      <div class="modalTitle">Settings</div>
      <button id="settingsClose" class="iconBtn" type="button" aria-label="Close">✕</button>
    </div>

    <div class="modalBody">
      <div class="settingRow">
        <div class="settingLabel">Music</div>
        <div class="settingControl">
          <input id="musicVol" type="range" min="0" max="100" value="18" />
          <div class="settingVal" id="musicVal">18%</div>
        </div>
      </div>

      <div class="settingRow">
        <div class="settingLabel">Sound effects</div>
        <div class="settingControl">
          <input id="sfxVol" type="range" min="0" max="100" value="60" />
          <div class="settingVal" id="sfxVal">60%</div>
        </div>
      </div>

      <label class="toggleRow">
        <input id="muteToggle" type="checkbox" />
        <span>Mute all audio</span>
      </label>

      <div class="fineprint">
        Audio starts after your first click (browser rule). Placeholder sounds included.
      </div>
    </div>
  </div>

</body>
</html>
