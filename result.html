<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bible Battle</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-bible-battle">
  <div class="container">
    <header class="topbar">
      <a class="btn btn-ghost" href="index.html">← Home</a>
      <div class="brand">
        <img class="brandLogo" src="assets/bible-battle-logo.png" alt="Bible Battle"/>
        <span class="brandText">Bible Battle</span>
      </div>
      <nav class="topnav">
        <button class="btn btn-ghost" id="settingsBtn" type="button">⚙️ Settings</button>
      </nav>
    </header>

    <div class="card">
      <!-- Info pills -->
      <div class="pillRow">
        <span class="pill" id="name"></span>
        <span class="pill" id="mode"></span>
        <span class="pill" id="cat"></span>
      </div>

      <div class="hr"></div>

      <!-- Rank line (appears after score is saved) -->
      <div id="rankLine" class="rankLine fade-section fade-hidden"></div>

      <!-- Score display -->
      <div class="scoreDisplay">
        <div class="statBlock">
          <div class="statLabel">Score</div>
          <div class="statVal" id="score"></div>
        </div>
        <div class="statDivider"></div>
        <div class="statBlock">
          <div class="statLabel">Correct</div>
          <div class="statVal">
            <span id="correct"></span>/<span id="total"></span>
          </div>
        </div>
      </div>

      <div class="hr"></div>

      <!-- Actions -->
      <div class="footerRow">
        <a class="btn btn-ghost" id="lbLink" href="leaderboard-daily.html">🏆 View Leaderboard</a>
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;">
          <button class="btn btn-ghost" id="reviewBtn" type="button">📖 Review Answers</button>
          <a class="btn btn-primary btn-big" href="index.html">🔁 Play Again</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Review Modal -->
  <div id="reviewOverlay" class="modalOverlay"></div>
  <div id="reviewModal" class="modal reviewModal">
    <div class="modalHeader">
      <div class="modalTitle">📖 Review Answers</div>
      <button id="reviewClose" class="iconBtn" type="button" aria-label="Close">✕</button>
    </div>
    <div class="modalBody reviewModalBody" id="reviewList">
      <!-- Populated by result.js -->
    </div>
  </div>

  <script type="module" src="result.js"></script>

  <!-- Review Answers — plain script (not a module) so it always runs fresh -->
  <script>
  (function() {
    var btn      = document.getElementById('reviewBtn');
    var modal    = document.getElementById('reviewModal');
    var overlay  = document.getElementById('reviewOverlay');
    var closeBtn = document.getElementById('reviewClose');
    var list     = document.getElementById('reviewList');
    if (!btn || !modal || !overlay || !closeBtn || !list) return;

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    var built = false;
    function buildList() {
      if (built) return;
      built = true;
      var items = null;
      try { items = JSON.parse(sessionStorage.getItem('bb_review') || 'null'); } catch(e) {}
      if (!items || !items.length) {
        list.innerHTML = '<p style="color:rgba(243,246,255,0.6);text-align:center;padding:24px 0">No review data — complete a game to see your answers here.</p>';
        return;
      }
      var icons  = { correct:'✅', wrong:'❌', timeout:'⏱️' };
      var labels = { correct:'Correct', wrong:'Wrong', timeout:'Time ran out' };
      items.forEach(function(item) {
        var outcome = item.correct ? 'correct' : (item.playerAnswer === null ? 'timeout' : 'wrong');
        var ans = '';
        if (outcome === 'correct') {
          ans = '<div class="reviewAnswerLine reviewAnswerLine--correct">Your answer: ' + esc(item.playerAnswer) + '</div>';
        } else if (outcome === 'wrong') {
          ans = '<div class="reviewAnswerLine reviewAnswerLine--wrong">Your answer: ' + esc(item.playerAnswer) + '</div>'
              + '<div class="reviewAnswerLine reviewAnswerLine--correct">✓ Correct: ' + esc(item.answer) + '</div>';
        } else {
          ans = '<div class="reviewAnswerLine reviewAnswerLine--timeout">Time ran out</div>'
              + '<div class="reviewAnswerLine reviewAnswerLine--correct">✓ Correct: ' + esc(item.answer) + '</div>';
        }
        var div = document.createElement('div');
        div.className = 'reviewItem reviewItem--' + outcome;
        div.innerHTML = '<div class="reviewItemIcon">' + icons[outcome] + '</div>'
          + '<div class="reviewItemBody">'
          +   '<div class="reviewItemMeta">Q' + item.num + ' <span class="reviewOutcomeLabel reviewOutcomeLabel--' + outcome + '">' + labels[outcome] + '</span></div>'
          +   '<div class="reviewItemPrompt">' + esc(item.prompt) + '</div>'
          +   ans
          + '</div>';
        list.appendChild(div);
      });
    }

    function openModal()  { buildList(); modal.classList.add('open'); overlay.classList.add('open'); }
    function closeModal() { modal.classList.remove('open'); overlay.classList.remove('open'); }

    btn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', closeModal);
    window.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
  })();
  </script>

  <div id="settingsOverlay" class="modalOverlay"></div>
  <div id="settingsModal" class="modal">
    <div class="modalHeader">
      <div class="modalTitle">Settings</div>
      <button id="settingsClose" class="iconBtn" type="button" aria-label="Close">✕</button>
    </div>
    <div class="modalBody">
      <div class="settingRow">
        <div class="settingLabel">Music</div>
        <div class="settingControl">
          <input id="musicVol" type="range" min="0" max="100" value="18" />
          <div class="settingVal" id="musicVal">18%</div>
        </div>
      </div>
      <div class="settingRow">
        <div class="settingLabel">Sound effects</div>
        <div class="settingControl">
          <input id="sfxVol" type="range" min="0" max="100" value="60" />
          <div class="settingVal" id="sfxVal">60%</div>
        </div>
      </div>
      <label class="toggleRow">
        <input id="muteToggle" type="checkbox" />
        <span>Mute all audio</span>
      </label>
      <div class="fineprint">
        Audio starts after your first click (browser rule).
      </div>
    </div>
  </div>

</body>
</html>
