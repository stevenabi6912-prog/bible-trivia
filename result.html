<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bible Battle</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-bible-battle">
  <div class="container">
    <div class="header">
      <a class="badge" href="index.html">← Home</a>
      <div class="brand">🎉 Results</div>
    </div>

    <div class="card">
      <div class="pillRow">
        <span class="pill" id="name"></span>
        <span class="pill" id="mode"></span>
        <span class="pill" id="cat"></span>
      </div>

      <div class="hr"></div>

      <div id="rankLine" class="rankLine fade-section fade-hidden"></div>

      <div class="row">
        <div class="col">
          <div class="small">Score</div>
          <div style="font-size:2.2rem; font-weight:900;" id="score"></div>
        </div>
        <div class="col">
          <div class="small">Correct</div>
          <div style="font-size:2.2rem; font-weight:900;">
            <span id="correct"></span>/<span id="total"></span>
          </div>
        </div>
      </div>

      <div class="hr"></div>

      <div class="row" style="align-items:center;">
        <div class="col">
          <a class="badge" id="lbLink" href="leaderboard-daily.html">View Leaderboard</a>
        </div>
        <div class="col" style="text-align:right;">
          <a class="btn btn-primary" href="index.html">Play Again</a>
        </div>
      </div>
    </div>
  </div>

  <script src="result.js"></script>
</body>
</html>
