<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bible Battle</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-bible-battle">
  <div class="container">
    <div class="header">
      <a class="badge" href="index.html">← Home</a>
      <div class="brand">🎉 Results</div>
    </div>

    <div class="card">
      <div class="pillRow">
        <span class="pill" id="name"></span>
        <span class="pill" id="mode"></span>
        <span class="pill" id="cat"></span>
      </div>

      <div class="hr"></div>

      <div id="rankLine" class="rankLine fade-section fade-hidden"></div>

      <div class="row">
        <div class="col" style="text-align:right;">
          <button class="btn btn-ghost" id="settingsBtn" type="button">⚙️ Settings</button>
        </div>
        <div class="col">
          <div class="small">Score</div>
          <div style="font-size:2.2rem; font-weight:900;" id="score"></div>
        </div>
        <div class="col">
          <div class="small">Correct</div>
          <div style="font-size:2.2rem; font-weight:900;">
            <span id="correct"></span>/<span id="total"></span>
          </div>
        </div>
      </div>

      <div class="hr"></div>

      <div class="row" style="align-items:center;">
        <div class="col">
          <a class="badge" id="lbLink" href="leaderboard-daily.html">View Leaderboard</a>
        </div>
        <div class="col" style="text-align:right;">
          <a class="btn btn-primary" href="index.html">Play Again</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="result.js"></script>
  <div id="settingsOverlay" class="modalOverlay"></div>
  <div id="settingsModal" class="modal">
    <div class="modalHeader">
      <div class="modalTitle">Settings</div>
      <button id="settingsClose" class="iconBtn" type="button" aria-label="Close">✕</button>
    </div>

    <div class="modalBody">
      <div class="settingRow">
        <div class="settingLabel">Music</div>
        <div class="settingControl">
          <input id="musicVol" type="range" min="0" max="100" value="18" />
          <div class="settingVal" id="musicVal">18%</div>
        </div>
      </div>

      <div class="settingRow">
        <div class="settingLabel">Sound effects</div>
        <div class="settingControl">
          <input id="sfxVol" type="range" min="0" max="100" value="60" />
          <div class="settingVal" id="sfxVal">60%</div>
        </div>
      </div>

      <label class="toggleRow">
        <input id="muteToggle" type="checkbox" />
        <span>Mute all audio</span>
      </label>

      <div class="fineprint">
        Audio starts after your first click (browser rule). Placeholder sounds included.
      </div>
    </div>
  </div>

</body>
</html>
