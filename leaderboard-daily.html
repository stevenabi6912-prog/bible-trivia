<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bible Battle</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-bible-battle">
  <div class="container">
    <header class="topbar">
      <a class="btn btn-ghost" href="index.html">← Home</a>
      <div class="brand">
        <div class="logo">🏆</div>
        <div class="title">Daily Leaderboard</div>
      </div>
      <div class="topbar-right">
        <button id="settingsBtn" class="btn btn-ghost">⚙️ Settings</button>
        <a class="btn btn-ghost" href="leaderboard-practice.html">🎯 Practice</a>
      </div>
    </header>

    <main class="card">
      <div class="lbControls">
        <div>
          <label>Challenge</label>
          <div class="pill">All Categories</div>
        </div>

        <div>
          <label>Last Week Winner</label>
          <div class="pill" id="lastWeekWinner">—</div>
          <div class="helper" id="lastWeekRange"></div>
        </div>

        <div>
          <label for="view">View</label>
          <select id="view" class="input-lg">
            <option value="week" selected>This Week</option>
            <option value="today">Today</option>
          </select>
          <div class="helper" id="seasonLabel"></div>
        </div>

        <div>
          <label for="limit">Show</label>
          <select id="limit" class="input-lg">
            <option value="10">Top 10</option>
            <option value="20" selected>Top 20</option>
            <option value="50">Top 50</option>
          </select>
        </div>
      </div>

      <div class="statusText" id="status"></div>

      <div class="tableWrap">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th class="num">Score</th>
              <th class="num">Correct</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="fineprint">Tie-breakers: score → correct → fastest time.</div>
    </main>
  </div>

  <script type="module" src="leaderboard-daily.js"></script>

  <div id="settingsOverlay" class="modalOverlay"></div>
  <div id="settingsModal" class="modal">
    <div class="modalHeader">
      <div class="modalTitle">Settings</div>
      <button id="settingsClose" class="icoBtn" aria-label="Close">✕</button>
    </div>
    <div class="modalBody">
      <div id="audioSettingsMount"></div>
    </div>
  </div>
</body>
</html>
