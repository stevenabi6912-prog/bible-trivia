<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bible Battle</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="theme-bible-battle">
  <div class="container">
    <header class="topbar">
      <a class="btn btn-ghost" href="index.html">← Home</a>
      <div class="brand">
        <img class="brandLogo" src="assets/bible-battle-logo.png" alt="Bible Battle"/>
        <span class="brandText">Daily Leaderboard</span>
      </div>
      <nav class="topnav">
        <button id="settingsBtn" class="btn btn-ghost" type="button">⚙️ Settings</button>
        <a class="btn btn-ghost" href="leaderboard-practice.html">🎯 Practice</a>
      </nav>
    </header>

    <main class="card">

      <!-- ── Winner Banners ───────────────────────────────────── -->
      <div class="winnerBanners">
        <div class="winnerBanner winnerBanner--kids">
          <div class="winnerBannerIcon">🎁</div>
          <div class="winnerBannerBody">
            <div class="winnerBannerLabel">Weekly Kids Prize Leader (12 &amp; under)</div>
            <div class="winnerBannerName" id="kidsWeeklyWinner">—</div>
            <div class="winnerBannerRange" id="kidsWeeklyRange"></div>
          </div>
        </div>
        <div class="winnerBanner winnerBanner--adults">
          <div class="winnerBannerIcon">🏆</div>
          <div class="winnerBannerBody">
            <div class="winnerBannerLabel">Last Week's Top Adult</div>
            <div class="winnerBannerName" id="adultsLastWinner">—</div>
            <div class="winnerBannerRange" id="adultsLastRange"></div>
          </div>
        </div>
      </div>

      <!-- ── Controls ────────────────────────────────────────── -->
      <div class="lbControls">
        <div>
          <label>Challenge</label>
          <div class="input-lg lbFixed">All Categories</div>
        </div>

        <div>
          <label for="view">View</label>
          <select id="view" class="input-lg">
            <option value="week" selected>This Week</option>
            <option value="today">Today</option>
          </select>
          <div class="helper" id="seasonLabel"></div>
        </div>

        <div>
          <label for="limit">Show</label>
          <select id="limit" class="input-lg">
            <option value="10">Top 10</option>
            <option value="20" selected>Top 20</option>
            <option value="50">Top 50</option>
          </select>
        </div>
      </div>

      <!-- ── Age Group Tabs ──────────────────────────────────── -->
      <div class="lbTabs" role="tablist" aria-label="Age group">
        <button class="lbTab selected" id="tabAll" role="tab" aria-selected="true"
                aria-controls="lbPanel">🌐 All Players</button>
        <button class="lbTab" id="tabKids" role="tab" aria-selected="false"
                aria-controls="lbPanel">👦 Kids (12 &amp; under)</button>
        <button class="lbTab" id="tabAdults" role="tab" aria-selected="false"
                aria-controls="lbPanel">👨 Adults (13+)</button>
      </div>

      <div class="statusText" id="status"></div>

      <div class="tableWrap" id="lbPanel" role="tabpanel">
        <table class="table lbTable--daily">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th class="num">Score</th>
              <th class="num">Correct</th>
              <th class="col-date">Date</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="fineprint">Tie-breakers: score → correct → fastest time.</div>
    </main>
  </div>

  <script type="module" src="leaderboard-daily.js"></script>

  <div id="settingsOverlay" class="modalOverlay"></div>
  <div id="settingsModal" class="modal">
    <div class="modalHeader">
      <div class="modalTitle">Settings</div>
      <button id="settingsClose" class="iconBtn" type="button" aria-label="Close">✕</button>
    </div>
    <div class="modalBody">
      <div class="settingRow">
        <div class="settingLabel">Music</div>
        <div class="settingControl">
          <input id="musicVol" type="range" min="0" max="100" value="18" />
          <div class="settingVal" id="musicVal">18%</div>
        </div>
      </div>
      <div class="settingRow">
        <div class="settingLabel">Sound effects</div>
        <div class="settingControl">
          <input id="sfxVol" type="range" min="0" max="100" value="60" />
          <div class="settingVal" id="sfxVal">60%</div>
        </div>
      </div>
      <label class="toggleRow">
        <input id="muteToggle" type="checkbox" />
        <span>Mute all audio</span>
      </label>
      <div class="fineprint">
        Audio starts after your first click (browser rule).
      </div>
    </div>
  </div>
</body>
</html>
