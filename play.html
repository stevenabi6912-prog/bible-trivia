<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bible Battle</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <!-- Boot music NOW — inline non-module script runs synchronously during HTML
       parsing, inside the browser's user-activation window from the navigation.
       Module scripts are deferred and may miss that window entirely. -->
  <script>
  (function(){
    try {
      var vol  = parseFloat(localStorage.getItem('bb_musicVol') || '0.18');
      var mute = (localStorage.getItem('bb_muted') || '0') === '1';
      var pos  = parseFloat(sessionStorage.getItem('bb_musicPos') || '0') || 0;
      var a = new Audio('assets/music/bg-loop.wav');
      a.loop   = true;
      a.volume = mute ? 0 : Math.min(1, Math.max(0, vol));
      if (pos > 0) a.currentTime = pos;
      window.__bbBg = a;          // audio.js will reuse this element
      a.play().catch(function(){}); // silent fail if still blocked
    } catch(e) {}
  })();
  </script>
</head>
<body class="theme-bible-battle">
  <div class="container">
    <header class="topbar">
      <a class="btn btn-ghost" href="index.html">← Home</a>
      <div class="brand">
        <img class="brandLogo" src="assets/bible-battle-logo.png" alt="Bible Battle"/>
        <span class="brandText">Bible Battle</span>
      </div>
      <nav class="topnav">
        <button class="btn btn-ghost" id="settingsBtn" type="button">⚙️</button>
        <a class="btn btn-ghost" href="leaderboard-daily.html">🏆 Daily</a>
        <a class="btn btn-ghost" href="leaderboard-practice.html">📚 Practice</a>
      </nav>
    </header>

    <div class="card">
      <div class="pillRow pillRow--game">
        <div class="kv">
          <span class="pill" id="pillName"></span>
          <span class="pill" id="pillCat"></span>
          <span class="pill" id="pillMode"></span>
          <span class="pill" id="pillQ">Q 1/10</span>
        </div>

        <div class="kv kv--right">
          <span class="pill" id="pillScore">Score: 0</span>
          <span class="pill" id="pillStreak">Streak: 0</span>
          <span class="pill">⏱️ <span id="timerNum">20</span>s</span>
        </div>
      </div>

      <div class="hr"></div>

      <div class="progressWrap" aria-label="progress">
        <div class="progress" id="progress"></div>
      </div>

      <div class="qPrompt" id="question">Loading…</div>
      <div class="small" id="ref"></div>

      <div class="choices" id="choices"></div>

      <div class="hr"></div>

      <div class="pillRow" style="justify-content:space-between; align-items:center;">
        <div class="small" id="status"></div>
      </div>
    </div>
  </div>

  <script type="module" src="play.js"></script>
  <div id="settingsOverlay" class="modalOverlay"></div>
  <div id="settingsModal" class="modal">
    <div class="modalHeader">
      <div class="modalTitle">Settings</div>
      <button id="settingsClose" class="iconBtn" type="button" aria-label="Close">✕</button>
    </div>

    <div class="modalBody">
      <div class="settingRow">
        <div class="settingLabel">Music</div>
        <div class="settingControl">
          <input id="musicVol" type="range" min="0" max="100" value="18" />
          <div class="settingVal" id="musicVal">18%</div>
        </div>
      </div>

      <div class="settingRow">
        <div class="settingLabel">Sound effects</div>
        <div class="settingControl">
          <input id="sfxVol" type="range" min="0" max="100" value="60" />
          <div class="settingVal" id="sfxVal">60%</div>
        </div>
      </div>

      <label class="toggleRow">
        <input id="muteToggle" type="checkbox" />
        <span>Mute all audio</span>
      </label>

      <div class="fineprint">
        Audio starts after your first click (browser rule). Placeholder sounds included.
      </div>
    </div>
  </div>

</body>
</html>
