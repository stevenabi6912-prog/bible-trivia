<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bible Battle - Play</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="play-page">

  <div class="top-nav">
    <button onclick="window.location.href='index.html'">← Home</button>
    <button id="dailyBtn">🏆 Daily</button>
    <button id="practiceBtn">📚 Practice</button>
  </div>

  <div class="game-card">
    <div class="game-header">
      <div class="left-info">
        <span id="playerName"></span>
        <span id="categoryName"></span>
        <span id="modeName"></span>
        <span id="questionCounter"></span>
      </div>

      <div class="right-info">
        <span>Score: <span id="score">0</span></span>
        <span>Streak: <span id="streak">0</span></span>
        <span>⏱ <span id="timer">10</span>s</span>
      </div>
    </div>

    <h2 id="questionText"></h2>

    <div id="choicesContainer" class="choices-grid"></div>

    <div id="feedback"></div>
  </div>

  <script src="play.js"></script>
</body>
</html>
