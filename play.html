<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Play • Bible Trivia</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <a class="badge" href="index.html">← Home</a>
      <div class="nav">
        <a class="badge" href="leaderboard-daily.html">🏆 Daily</a>
        <a class="badge" href="leaderboard-practice.html">📚 Practice</a>
      </div>
    </div>

    <div class="card">
      <div class="pillRow" style="justify-content:space-between;">
        <div class="kv">
          <span class="pill" id="pillName"></span>
          <span class="pill" id="pillCat"></span>
          <span class="pill" id="pillMode"></span>
          <span class="pill" id="pillQ">Q 1/10</span>
        </div>

        <div class="kv">
          <span class="pill" id="pillScore">Score: 0</span>
          <span class="pill" id="pillStreak">Streak: 0</span>
          <span class="pill">⏱️ <span id="timerNum">15</span>s</span>
        </div>
      </div>

      <div class="hr"></div>

      <div class="progressWrap" aria-label="progress">
        <div class="progress" id="progress"></div>
      </div>

      <div class="qPrompt" id="question">Loading…</div>
      <div class="small" id="ref"></div>

      <div class="choices" id="choices"></div>

      <div class="hr"></div>

      <div class="pillRow" style="justify-content:space-between; align-items:center;">
        <button class="secondary" id="quit">Quit</button>
        <div class="small" id="status"></div>
      </div>
    </div>
  </div>

  <script type="module" src="play.js"></script>
</body>
</html>
